name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels:
  - feature

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the feature you would like to add.
      placeholder: Explain your idea...
    validations:
      required: true

  - type: textarea
    id: benefit
    attributes:
      label: Benefit
      description: Why should this feature be added?
    validations:
      required: true
