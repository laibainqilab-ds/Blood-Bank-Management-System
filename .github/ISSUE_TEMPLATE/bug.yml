name: Bug Report
description: Report a bug
title: "[Bug]: "
labels:
  - bug

body:
  - type: textarea
    id: bug
    attributes:
      label: Describe the bug
      description: What happened?
      placeholder: Explain the problem...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
